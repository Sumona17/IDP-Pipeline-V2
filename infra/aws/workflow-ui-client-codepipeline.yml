AWSTemplateFormatVersion: "2010-09-09"
Description: "CodePipeline + CodeBuild CI/CD for workflow-ui/client deployment to S3 + CloudFront"

Parameters:
  PipelineName:
    Type: String
    Default: idp-workflow-ui-client-pipeline

  ConnectionArn:
    Type: String
    Description: "CodeStar connection ARN for GitHub (us-east-1)."

  FullRepositoryId:
    Type: String
    Default: exavalu-solutions/idp-pipeline
    Description: "GitHub owner/repo"

  BranchName:
    Type: String
    Default: development

  DeployRegion:
    Type: String
    Default: us-east-1

  UiStackName:
    Type: String
    Default: idp-workflow-ui-client

  ProjectName:
    Type: String
    Default: idp-workflow-ui

  EnvironmentName:
    Type: String
    Default: dev

  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All

  ApiOriginDomainName:
    Type: String
    Default: ""
    Description: "Optional override. If empty, buildspec derives from workflow-ui/client/.env"

Resources:
  PipelineArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${AWS::StackName}-codebuild-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource: "*"
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplateSummary
                  - cloudformation:UpdateStack
                Resource: "*"
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:UpdateDistribution
                Resource: "*"
              - Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"

  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${AWS::StackName}-codepipeline-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                  - s3:ListBucket
                Resource:
                  - !GetAtt PipelineArtifactBucket.Arn
                  - !Sub "${PipelineArtifactBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt DeployCodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref ConnectionArn

  DeployCodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${PipelineName}-deploy"
      Description: "Deploy workflow-ui/client to S3 + CloudFront"
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          env:
            shell: bash
          phases:
            install:
              runtime-versions:
                nodejs: 20
            pre_build:
              commands:
                - "set -euo pipefail"
                - "echo Preparing deploy for workflow-ui/client"
                - "export AWS_REGION=${AWS_REGION:-us-east-1}"
                - "echo Using existing UI stack: ${STACK_NAME}"
                - "export UI_BUCKET=$(aws cloudformation describe-stacks --region \"$AWS_REGION\" --stack-name \"$STACK_NAME\" --query \"Stacks[0].Outputs[?OutputKey=='UiBucketName'].OutputValue\" --output text)"
                - "export CF_DIST_ID=$(aws cloudformation describe-stacks --region \"$AWS_REGION\" --stack-name \"$STACK_NAME\" --query \"Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue\" --output text)"
                - "export CF_DOMAIN=$(aws cloudformation describe-stacks --region \"$AWS_REGION\" --stack-name \"$STACK_NAME\" --query \"Stacks[0].Outputs[?OutputKey=='CloudFrontDomainName'].OutputValue\" --output text)"
                - "test -n \"$UI_BUCKET\""
                - "test -n \"$CF_DIST_ID\""
                - "test -n \"$CF_DOMAIN\""
                - "export VITE_APP_BASE_URL=https://${CF_DOMAIN}/api/workflow"
                - "echo Using VITE_APP_BASE_URL=${VITE_APP_BASE_URL}"
            build:
              commands:
                - "set -euo pipefail"
                - "cd workflow-ui/client"
                - "npm install"
                - "npm run build"
                - "cd ../.."
            post_build:
              commands:
                - "set -euo pipefail"
                - "echo Syncing assets to s3://${UI_BUCKET}/"
                - "aws s3 sync workflow-ui/client/dist s3://${UI_BUCKET}/ --delete --cache-control public,max-age=31536000,immutable --exclude index.html"
                - "aws s3 cp workflow-ui/client/dist/index.html s3://${UI_BUCKET}/index.html --cache-control no-cache,max-age=0 --content-type \"text/html; charset=utf-8\""
                - "aws cloudfront create-invalidation --distribution-id $CF_DIST_ID --paths '/*'"
                - "echo Deployment complete: https://${CF_DOMAIN}"
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: AWS_REGION
            Value: !Ref DeployRegion
          - Name: STACK_NAME
            Value: !Ref UiStackName
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: ENVIRONMENT
            Value: !Ref EnvironmentName
          - Name: PRICE_CLASS
            Value: !Ref PriceClass
          - Name: API_ORIGIN_DOMAIN_NAME
            Value: !Ref ApiOriginDomainName
      TimeoutInMinutes: 60

  WorkflowUiClientPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Ref PipelineName
      RoleArn: !GetAtt CodePipelineServiceRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref PipelineArtifactBucket
      RestartExecutionOnUpdate: true
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              OutputArtifacts:
                - Name: SourceOutput
              Configuration:
                ConnectionArn: !Ref ConnectionArn
                FullRepositoryId: !Ref FullRepositoryId
                BranchName: !Ref BranchName
                DetectChanges: true
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: DeployClient
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref DeployCodeBuildProject
              RunOrder: 1

Outputs:
  PipelineName:
    Value: !Ref WorkflowUiClientPipeline
  CodeBuildProjectName:
    Value: !Ref DeployCodeBuildProject
  ArtifactBucketName:
    Value: !Ref PipelineArtifactBucket
