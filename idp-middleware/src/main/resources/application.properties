# -------------------------
# General Spring Boot
# -------------------------
logging.level.org.springframework.security=INFO
spring.jpa.autoconfigure=false
spring.datasource.autoconfigure=false
spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
spring.application.name=middleware
spring.main.allow-bean-definition-overriding=true
server.port=8080
server.servlet.context-path=/idp-middleware

# -------------------------
# AWS Cognito (Resource Server)
# -------------------------
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://cognito-idp.${AWS_REGION}.amazonaws.com/${COGNITO_USER_POOL_ID}

# -------------------------
# JPA / Hibernate
# -------------------------
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------------
# Swagger / OpenAPI
# -------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# -------------------------
# AWS
# -------------------------
aws.region=${AWS_REGION}
aws.dynamodb.table-name=${DDB_TABLE_NAME}
aws.dynamodb.submission-status-table=${IN_REVIEW_DDB_TABLE_NAME}

# -------------------------
# AWS-BUCKET
# -------------------------
aws.bucketname=${AWS_S3_BUCKET}server.servlet.context-path=/idp-middleware

cors.allowed-origins=https://d2hx0nuw6u3ib3.cloudfront.net,https://d2g0dquu6t5gfp.cloudfront.net,http://localhost:3000,http://localhost:4200,http://localhost:5173,http://localhost:8080
cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type
cors.allow-credentials=true